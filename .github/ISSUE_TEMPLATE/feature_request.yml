name: Feature request
description: Propose a new capability or improvement
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your ideal API or behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What options did you evaluate?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, examples, and constraints.
